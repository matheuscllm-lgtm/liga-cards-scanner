name: tests

# Public-repo CI: runs the unit test suite only. No secrets, no external paid
# services, standard ubuntu-latest runner (free for public repositories).
#
# The live data path drives a real headful browser, but every test in tests/
# exercises pure parsers/helpers — the browser library is imported lazily and
# is never launched here, so `pytest` is green without installing a browser.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest -q
